name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest black
    
    - name: Format with Black
      run: |
        cd backend
        black --check . || black .
    
    - name: Run tests
      run: |
        cd backend
        pytest tests/ -q

  frontend-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: '20'
    
    - name: Install dependencies
      run: |
        cd frontend
        npm install
    
    - name: Build
      run: |
        cd frontend
        npm run build
      continue-on-error: true

  sdk-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install SDK
      run: |
        cd sdk
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest black
    
    - name: Format with Black
      run: |
        cd sdk
        black --check agentwatch || black agentwatch
    
    - name: Run tests
      run: |
        cd sdk
        pytest -q
      continue-on-error: true